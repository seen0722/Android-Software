layer: customer/trimble
customer: trimble
isolation_group: trimble
conventions:
  branch_pattern: "release/T70-A{androidver}-{mr}-{sku}"   # e.g. release/T70-A15-2.x.0-GMS
  dev_branch: "thorpe_dev"             # main development (default.xml revision)
  customer_dev_branch: "trimble_dev"   # customer internal development
  hotfix_pattern: "hotfix/T70-{ver}-{slug}-HF{n}"
  sku_encoding: "T70-{sku}-A{androidver}"            # manifest token, e.g. T70-GMS-A15
  manifest_naming: "T70-{sku}-A{androidver}-{mr}.{yymmdd}.xml"  # pinned file; date is part of the SW version
  version_scheme: "{mr}.{yymmdd}"      # e.g. 02.03.00.260523 (MR 02.03.00 + date 260523 YYMMDD)
source:
  manifest_repo: "ssh://git@10.192.188.16/qcs6490/manifest.git"
  gitlab_location: "http://10.192.188.16/qcs6490"
  repo_url: "ssh://git@10.192.188.16/qcs6490/android14/repo"   # internal `repo` tool bootstrap mirror (NOT Google's); single-repo model since MR3
  fetch:
    # Authoritative fetch (Nick Chuang / Pegatron, 2026-05-18): single unified manifest since MR3.
    init: "repo init -u {manifest_repo} -b default -m {manifest_file} --repo-url=ssh://git@10.192.188.16/qcs6490/android14/repo"
    sync: "repo sync"
    workspace_hint: "/mnt/data_1/<user>/thorpe_dev_A15"   # internal build server source path (user/host/creds NOT stored here)
  # build_script inherited from base.yaml (shell-script/build_all.bash)
properties:                          # device-confirmed via adb getprop
  ro.product.manufacturer: "Trimble Inc"
  ro.product.model: T70
  ro.product.name: T70
  ro.product.device: thorpe
  ro.board.platform: lahaina
  ro.product.board: lahaina
  ro.hardware: qcom
  # build fingerprint/SPL are per-build, e.g. Trimble/T70/thorpe:15/AQ3A.250924.001/<ver>:userdebug/release-keys
governance:
  delivery_branch: "release/T70-A15-*"   # RED LINE — GMS & CN release branches (90-day MR cycle)
  cert_owner: customer                   # GMS cert account owned by the customer (Trimble). RED LINE: treat CTS/GTS/GMS settings as read-only; confirm before any change.
  approval_gate: "customer-signoff"      # FILL: confirm Trimble sign-off process
issue_tracker:                           # informational (from prior SKILL.md)
  type: redmine
  url: "http://redminehq.pegatroncorp.com"
  project: thorpe
  project_id: 44
