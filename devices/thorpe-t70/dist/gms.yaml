layer: dist/gms
distribution: gms
sku_code: GMS                      # manifest SKU token, e.g. T70-GMS-A15
build_option: "-g"                 # build_all.bash GMS option (GMS in QSSI part); use -gs to also secure-sign
gms:
  integrated: true
  overlay: vendor/partner_gms      # GMS overlay (GitLab id 29239)
  modules: vendor/partner_modules  # GMS modules (GitLab id 29240)
certification:
  programs: [cts, gts, vts]
  status: passed                   # currently passed
  recert_cycle: 90d                # re-submitted every 90 days (each MR) to cover security patch (SPL) updates
  tracker: "Redmine project 'thorpe'"
source:
  release_manifest: "T70-GMS-A15-{mr}.{yymmdd}.xml"   # pinned RELEASE manifest. Daily dev uses default.xml (see base.yaml).
